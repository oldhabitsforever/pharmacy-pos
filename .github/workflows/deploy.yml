name: Deploy to Cloudflare Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Push database schema and seed data
        run: |
          npx prisma generate
          npx prisma db push --accept-data-loss
          npx prisma db seed
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - name: Build with next-on-pages
        run: npx @cloudflare/next-on-pages@1
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: https://pharmacy-pos.pages.dev
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler@3 pages project create pharmacy-pos --production-branch=main 2>&1 || true
          npx wrangler@3 pages deploy .vercel/output/static --project-name=pharmacy-pos --commit-dirty=true --branch=main
